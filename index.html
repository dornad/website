<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Daniel Rodriguez — iOS & Game Developer</title>
        <meta
            name="description"
            content="Daniel Rodriguez — iOS Software Engineer & Game Developer based in NYC."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --bg: #0e1117;
                --surface: #161b22;
                --border: #21262d;
                --text-primary: #e6edf3;
                --text-secondary: #7d8590;
                --text-dim: #484f58;
                --accent: #58a6ff;
                --accent-glow: rgba(88, 166, 255, 0.12);
                --green: #3fb950;
                --mono: "JetBrains Mono", monospace;
                --serif: "Source Serif 4", Georgia, serif;
            }

            html {
                height: 100%;
            }

            body {
                font-family: var(--mono);
                background: var(--bg);
                color: var(--text-primary);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 2rem;
                position: relative;
                overflow: hidden;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
                background-size: 64px 64px;
                opacity: 0.25;
                pointer-events: none;
            }

            body::after {
                content: "";
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 600px;
                height: 600px;
                background: radial-gradient(
                    circle,
                    var(--accent-glow) 0%,
                    transparent 70%
                );
                pointer-events: none;
                opacity: 0.6;
            }

            .container {
                position: relative;
                z-index: 1;
                max-width: 540px;
                width: 100%;
            }

            .prompt {
                font-size: 0.75rem;
                color: var(--text-dim);
                letter-spacing: 0.05em;
                margin-bottom: 1.5rem;
                line-height: 1.6;
            }

            .prompt .path {
                color: var(--accent);
            }
            .prompt .cursor {
                display: inline-block;
                width: 7px;
                height: 14px;
                background: var(--accent);
                vertical-align: middle;
                margin-left: 2px;
                animation: blink 1s step-end infinite;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            .name {
                font-family: var(--serif);
                font-size: 2.5rem;
                font-weight: 600;
                letter-spacing: -0.02em;
                line-height: 1.1;
                margin-bottom: 0.5rem;
            }

            .tagline {
                font-size: 0.9rem;
                font-weight: 300;
                color: var(--text-secondary);
                margin-bottom: 2.5rem;
                line-height: 1.5;
            }

            .tagline span {
                color: var(--text-primary);
                font-weight: 400;
            }

            .status {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 0.5rem 0.85rem;
                font-size: 0.75rem;
                color: var(--text-secondary);
                margin-bottom: 2.5rem;
            }

            .status-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--green);
                box-shadow: 0 0 6px var(--green);
                animation: pulse 2s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }

            .divider {
                width: 100%;
                height: 1px;
                background: var(--border);
                margin-bottom: 2rem;
            }

            .links {
                display: flex;
                flex-direction: column;
                gap: 0.25rem;
            }

            .link {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.7rem 0.85rem;
                border-radius: 6px;
                text-decoration: none;
                color: var(--text-secondary);
                font-size: 0.8rem;
                font-weight: 400;
                transition: all 0.15s ease;
                border: 1px solid transparent;
            }

            .link:hover {
                background: var(--surface);
                border-color: var(--border);
                color: var(--text-primary);
            }

            .link:hover .link-icon {
                color: var(--accent);
            }

            .link-icon {
                width: 18px;
                height: 18px;
                flex-shrink: 0;
                transition: color 0.15s ease;
            }

            .link-label {
                color: var(--text-dim);
                min-width: 72px;
            }
            .link-value {
                color: inherit;
            }

            .link:hover .link-arrow {
                opacity: 1;
                transform: translateX(0);
            }
            .link-arrow {
                margin-left: auto;
                opacity: 0;
                transform: translateX(-4px);
                transition: all 0.15s ease;
                color: var(--text-dim);
                font-size: 0.75rem;
            }

            .footer {
                margin-top: 3rem;
                font-size: 0.65rem;
                color: var(--text-dim);
                letter-spacing: 0.03em;
            }

            @media (max-width: 480px) {
                .name {
                    font-size: 1.8rem;
                }
                .tagline {
                    font-size: 0.8rem;
                }
                body {
                    padding: 1.5rem;
                }
            }
        </style>
    </head>
